services:
  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tareas_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.SQL:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: redis-server
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: api-tareas
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    command: ["npm", "run", "dev"]

  worker:
    build: .
    container_name: worker-tareas
    command: ["npm", "run", "worker"]
    depends_on:
      redis:
        condition: service_started
    env_file:
      - .env

volumes:
  mysql_data:
